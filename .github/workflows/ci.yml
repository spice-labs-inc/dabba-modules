name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false
      - run: tofu fmt -check -recursive

  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [kind, k3d, minikube, git-server, flux-operator]
    steps:
      - uses: actions/checkout@v5
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false
      - run: tofu -chdir=modules/${{ matrix.module }} init -backend=false
      - run: tofu -chdir=modules/${{ matrix.module }} validate

  tflint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: terraform-linters/setup-tflint@v5
      - run: tflint --init
      - run: tflint --recursive

  # IaC misconfiguration scanning (HCL).
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: .
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: "true"

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --redact --no-banner --verbose
