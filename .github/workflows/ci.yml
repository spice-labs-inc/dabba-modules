name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false
      - run: tofu fmt -check -recursive

  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [kind, k3d, minikube, git-server, flux-operator]
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false
      - run: tofu -chdir=modules/${{ matrix.module }} init -backend=false
      - run: tofu -chdir=modules/${{ matrix.module }} validate
